name: quality-first
description: |
  Quality-first routing: Claude for all code-critical roles (planner, architect,
  implementer, reviewer, security, specialists), Gemini for high-volume support
  roles (research, explore, tester). Roughly 35-50% cheaper than all-Claude on
  typical feature-implementation runs without sacrificing code quality.

defaults:
  fallbacks: [claude-haiku-4-5]
  max_retries: 1
  timeout_seconds: 600

by_role:
  # Large context / web search / exploration → Gemini 2.5 Pro
  research:           { provider: google,    model: gemini-2.5-pro,   fallbacks: [claude-sonnet-4-6] }
  explore:            { provider: google,    model: gemini-2.5-flash, fallbacks: [claude-sonnet-4-6] }
  generalPurpose:     { provider: google,    model: gemini-2.5-pro,   fallbacks: [claude-sonnet-4-6] }

  # Reasoning + instruction-following → Claude
  planner:            { provider: anthropic, model: claude-sonnet-4-6 }
  software-architect: { provider: anthropic, model: claude-opus-4-7,  fallbacks: [claude-sonnet-4-6] }
  implementer:        { provider: anthropic, model: claude-sonnet-4-6 }
  code-reviewer:      { provider: anthropic, model: claude-sonnet-4-6 }
  security-auditor:   { provider: anthropic, model: claude-sonnet-4-6 }

  # Mechanical / cheap → Gemini Flash for tester, Haiku for verifier
  tester:             { provider: google,    model: gemini-2.5-flash, fallbacks: [claude-haiku-4-5] }
  verifier:           { provider: anthropic, model: claude-haiku-4-5 }

  # Domain specialists — code-heavy work → Claude
  package-upgrade:             { provider: anthropic, model: claude-sonnet-4-6 }
  crashlytics-fixer:           { provider: anthropic, model: claude-sonnet-4-6 }
  sentry-fixer:                { provider: anthropic, model: claude-sonnet-4-6 }
  terraform-maintainer:        { provider: anthropic, model: claude-sonnet-4-6 }
  crossplane-upjet-maintainer: { provider: anthropic, model: claude-sonnet-4-6 }
