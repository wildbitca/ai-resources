name: all-gemini
description: |
  Every role on Google Gemini 2.5 — Pro for reasoning, Flash for code/review,
  Flash-Lite for verifier. Lowest cost; some loss of code-quality precision
  on tool use compared to Claude.

defaults:
  fallbacks: [gemini-2.5-flash]
  max_retries: 3
  timeout_seconds: 600

by_role:
  research:           { provider: google, model: gemini-2.5-pro }
  explore:            { provider: google, model: gemini-2.5-flash }
  generalPurpose:     { provider: google, model: gemini-2.5-pro }
  planner:            { provider: google, model: gemini-2.5-pro }
  software-architect: { provider: google, model: gemini-2.5-pro }
  implementer:        { provider: google, model: gemini-2.5-pro }
  code-reviewer:      { provider: google, model: gemini-2.5-flash }
  security-auditor:   { provider: google, model: gemini-2.5-pro }
  tester:             { provider: google, model: gemini-2.5-flash }
  verifier:           { provider: google, model: gemini-2.5-flash-lite }
  package-upgrade:             { provider: google, model: gemini-2.5-pro }
  crashlytics-fixer:           { provider: google, model: gemini-2.5-pro }
  sentry-fixer:                { provider: google, model: gemini-2.5-pro }
  terraform-maintainer:        { provider: google, model: gemini-2.5-pro }
  crossplane-upjet-maintainer: { provider: google, model: gemini-2.5-pro }
