# Domain command reference and guidance — single source of truth.
#
# Template workflows reference this file for domain-specific content:
#   - test/analyze/build/migration commands
#   - research_guidance: what to explore in the codebase
#   - implement_guidance: domain conventions for implementation
#
# Inheritance: api-platform extends symfony extends php.
# When resolving commands for api-platform, merge: php → symfony → api-platform.
#
# IMPORTANT: When adding a new domain, add its section here. Template workflows
# and personas reference this file rather than hardcoding domain-specific content.

php:
  analyze:
    - "php -l src/"
  format:
    - "php vendor/bin/php-cs-fixer fix --dry-run --diff"
  prerequisites: [php]
  research_guidance: |
    Explore PHP codebase: classes, interfaces, traits, namespaces, autoloading.
    Check composer.json for dependencies and scripts.
  implement_guidance: |
    PHP 8.2+ features: readonly properties, enums, named arguments, fibers.
    Strict types (declare(strict_types=1)). No suppressed errors (@).

symfony:
  extends: php
  test:
    - "php bin/phpunit"
  analyze:
    - "php vendor/bin/phpstan analyse"
    - "php vendor/bin/php-cs-fixer fix --dry-run --diff"
  build: []
  migration:
    - "php bin/console doctrine:migrations:migrate --no-interaction"
  prerequisites: [php, composer, phpunit]
  research_guidance: |
    Explore Symfony codebase: services, entities, controllers, repositories, events,
    Messenger handlers, Doctrine mappings, config/packages/, security.yaml.
    Check service definitions, routing, and bundle configuration.
  implement_guidance: |
    Thin controllers, autowired services for business logic, Doctrine entities with
    proper mappings, events for side effects, Messenger for async processing.
    Repository pattern for data access. No raw SQL outside repositories.

api-platform:
  extends: symfony
  research_guidance: |
    Explore API Platform: #[ApiResource] attributes, state providers, state processors,
    filters, serialization groups, DTOs, OpenAPI spec annotations.
    Also apply all Symfony research guidance (entities, services, Doctrine).
  implement_guidance: |
    Resource-centric design. State providers for reads, state processors for writes.
    Proper serialization groups for input/output. Custom filters for collection operations.
    DTO pattern for complex operations. OWASP API Top 10 compliance.
    Plus all Symfony implementation conventions.

dart-flutter:
  test:
    - "flutter test"
  analyze:
    - "dart analyze --fatal-infos"
  format:
    - "dart format --set-exit-if-changed ."
  build:
    - "flutter build apk --debug"
  prerequisites: [flutter, dart]
  research_guidance: |
    Explore: lib/features/, lib/core/, providers, services, widgets.
    Analyze Riverpod provider/state dependencies and data flow.
    Trace GoRouter navigation, guards, and deep links.
    Check Dio HTTP client usage patterns (factories, interceptors).
    Review theme tokens and Material 3 widget composition.
  implement_guidance: |
    Clean architecture: lib/features/{feature}/ with providers, models, widgets, screens.
    Riverpod @riverpod code-gen, AsyncNotifier, ref.watch in build(), ref.read in handlers.
    GoRouter typed routes, StatefulShellRoute for bottom nav.
    Dio HttpClient factories (create, createAuthenticated, createQuick, createForUpload).
    Material 3 theme tokens — never hardcode colors. Dispose all controllers.

angular:
  test:
    - "ng test --watch=false --code-coverage"
  analyze:
    - "npx eslint . --max-warnings=0"
  build:
    - "ng build"
  prerequisites: [ng, npm]
  research_guidance: |
    Explore Angular codebase: components, services, modules, routing, state management.
    Check standalone components, lazy-loaded routes, signal usage, reactive forms.
  implement_guidance: |
    Standalone components, OnPush change detection, signals for state.
    Strict TypeScript. RxJS with takeUntilDestroyed for subscriptions.
    Reactive forms for user input. Proper HttpClient usage with interceptors.

devops:
  test:
    - "terraform validate"
    - "terraform plan -out=tfplan"
  analyze:
    - "tfsec ."
    - "checkov --directory ."
  build: []
  prerequisites: [terraform]
  research_guidance: |
    Explore IaC: Terraform modules/state, Crossplane compositions/XRDs,
    K8s namespaces/workloads, FluxCD/ArgoCD configs, Helm charts.
    Check provider versions, state backends, environment configs.
  implement_guidance: |
    HCL formatting (terraform fmt), modular design, remote state, proper variable/output.
    K8s: namespace isolation, RBAC, network policies.
    GitOps: Flux/Argo reconciliation, sealed secrets.

security:
  sast:
    - "semgrep --config auto"
    - "gitleaks detect --source . --report-format json"
  dependency_scan:
    - "trivy fs --security-checks vuln ."
  prerequisites: []
  research_guidance: |
    Map attack surface: APIs, auth endpoints, file uploads, external integrations,
    IaC resources, client-side storage. Identify trust boundaries and data flows.
  implement_guidance: |
    OWASP guidelines. Input validation at boundaries. Parameterized queries.
    Principle of least privilege. No hardcoded secrets.
