# Domain-agnostic feature workflow template.
# Orchestrator resolves {{domain}} from detection. Domain-specific content comes from:
#   - _domain-commands.yaml (commands, research_guidance, implement_guidance)
#   - Persona files (personas/{role}-{domain}.md → roles/{role}.md)
#
# Flow: [worktree] → research → plan → architect → implement → test → review → security → verify → [merge]
# REQUIRES worktree. See .cursorrules.
#
# handoff_file: .agent-output/handoff-<branch>.md. DELETE when DONE.
# Domain commands: .cursor/workflows/_domain-commands.yaml ({{domain}} section)
#
# Rules: (1) NEVER implement without architect-approved plan
# (2) Implementer NEVER writes tests (tester does)
# (3) ALWAYS code-review before considering done
# (4) ALWAYS security-auditor for features with sensitive data
#
name: feature-implementation
description: Domain-agnostic feature workflow. research → plan → architect → implement → test → review → security → verify.
domain: "{{domain}}"
trigger: User asks to implement a feature, new functionality, or multi-step task.
prerequisites: []
steps:
  - id: research
    subagent_type: generalPurpose
    skills:
      - common/best-practices
      - common/context-optimization
    entry_criteria: User goal defined
    exit_criteria: Research document written to knowledge/research/
    handoff_to: plan
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Goal: {{user_goal}}.
      Assess task complexity. If simple (config change, cosmetic, single-file), set Research_needed: no in {{handoff_file}} and advance.
      If complex (new feature, multi-file, unfamiliar area):
        1. Read relevant specs from specs/features/ and specs/architecture/ for existing requirements and constraints.
        2. Search knowledge/research/ for prior research on this topic.
        3. Follow the research_guidance from .cursor/workflows/_domain-commands.yaml for {{domain}}.
        4. Generate knowledge/research/YYMMDD-{topic}.md with: summary, file:line refs, architecture insights, existing patterns, open questions.
      Update {{handoff_file}} (Research_ref, Spec_refs: list of specs read, Research_needed, Next=planner).
      If blocked, set Blocked: true, Return_to_step: research, Block_reason: [reason].
  - id: plan
    subagent_type: planner
    skills:
      - common/product-requirements
      - common/system-design
    entry_criteria: Research complete or skipped
    exit_criteria: Plan with acceptance criteria written
    handoff_to: architect
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Goal: {{user_goal}}.
      Read Research_ref and Spec_refs from {{handoff_file}}. Read relevant specs from specs/features/ for existing requirements.
      If the spec has status != stub, read its ## Test Scenarios (BDD) section and derive acceptance criteria from specific TS-IDs.
      If the spec is a stub, write acceptance criteria as Given/When/Then so they can be promoted to spec scenarios later.
      Iterate the plan internally at least 2 times: first draft, self-review, refined version.
      Output: Create plan YYMMDD-NNN.md in .agent-output/planner/ with description, files, steps, checklist, security notes, Requires_tests, Security_critical_feature.
      Each phase MUST include: (a) Automated_verification: exact commands + expected exit codes + TS-IDs that must pass, (b) Manual_verification: human-only checklist or "none".
      Save plan also to knowledge/decisions/YYMMDD-{topic}-plan.md.
      Update {{handoff_file}} (Plan_ref, Requires_tests, Security_critical_feature, Requirements_preserved: key constraints from specs + TS-IDs, Next=software-architect).
      If blocked, set Blocked: true, Return_to_step: plan, Block_reason: [reason].
  - id: architect
    subagent_type: software-architect
    skills:
      - common/architecture-diagramming
      - common/system-design
    entry_criteria: Plan exists
    exit_criteria: Architecture validated or concerns raised
    handoff_to: implement
    on_concern_return_to: plan
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Read {{handoff_file}}, Plan_ref, and Spec_refs. Validate plan against project architecture, existing specs, and ADRs in specs/architecture/.
      Generate analysis YYMMDD-NNN.md in .agent-output/architect/.
      If APPROVED: update {{handoff_file}} (Architect_approval: yes, Next=implementer).
      If REJECTED: set Blocked: true, Return_to_step: plan, Block_reason: [observations].
  - id: implement
    subagent_type: implementer
    skills:
      - common/best-practices
      - common/error-handling
    entry_criteria: Plan and architecture approved
    exit_criteria: Code changes complete, no lint errors
    handoff_to: test
    on_concern_return_to: architect
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Read {{handoff_file}} and Plan_ref. Verify Architect_approval: yes before implementing.
      Follow implement_guidance from .cursor/workflows/_domain-commands.yaml for {{domain}} and your loaded persona.
      Implement code per the plan. Do NOT write tests.
      If you discover information affecting the plan, update Plan_ref with '## Implementation Notes'. Set Plan_updated: yes in {{handoff_file}}.
      Run analyze commands from _domain-commands.yaml to verify no lint errors.
      Update {{handoff_file}} (Changes made, Next=tester if Requires_tests else code-reviewer).
      If blocked, set Blocked: true, Return_to_step: architect, Block_reason: [reason].
  - id: test
    subagent_type: tester
    skills:
      - common/tdd
    entry_criteria: Implementation complete
    exit_criteria: All tests pass
    handoff_to: review
    on_concern_return_to: implement
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Read {{handoff_file}}. If Requires_tests: no, skip tests, update {{handoff_file}} (Next=code-reviewer) and advance.
      If Requires_tests: yes:
        1. Read Spec_refs from handoff. If spec has ## Test Scenarios (BDD), implement tests for each [automated] scenario referenced by the plan (use TS-IDs from plan acceptance criteria).
        2. Name test functions to match scenario IDs for traceability (e.g. testTsPet001_mutualExclusivity).
        3. Add comment header in each test file: // Validates: TS-{FEAT}-NNN — {title}
        4. Run test + analyze commands from .cursor/workflows/_domain-commands.yaml ({{domain}} section).
        5. After tests pass, update the spec's Traceability Matrix with test file paths and status.
        6. Create report in .agent-output/tester/ with coverage: "{N}/{M} plan scenarios have passing tests".
      MANDATORY: ALL test/analyze commands MUST exit 0. If any fails, set Blocked: true, Return_to_step: implement, Block_reason: [failures with details].
      Update {{handoff_file}} (Test_report, Next=code-reviewer).
  - id: review
    subagent_type: code-reviewer
    skills:
      - common/code-review
      - common/security-standards
    entry_criteria: Tests pass
    exit_criteria: Code review approved or changes requested
    handoff_to: security
    on_concern_return_to: implement
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Read {{handoff_file}}, changed files, and Spec_refs. Apply domain review checklist from your loaded persona. Run test commands from _domain-commands.yaml.
      Check that implementation respects Requirements_preserved from handoff.
      Generate report in .agent-output/code-reviewer/.
      If APPROVED: update {{handoff_file}} (Code_review_verdict: APPROVED, Next=security-auditor).
      If REQUIRES_CHANGES: set Blocked: true, Return_to_step: implement, Block_reason: [corrections].
  - id: security
    subagent_type: security-auditor
    skills:
      - common/security-audit
      - common/security-standards
    entry_criteria: Code review approved
    exit_criteria: No critical/high findings
    handoff_to: verify
    on_concern_return_to: implement
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Read {{handoff_file}}. If Security_critical_feature: no, set Security_audit: N/A, Next=verifier and advance.
      If yes, execute the methodology from .cursor/workflows/security-devsecops.workflow.yaml adapted to {{domain}}. Use tools from _domain-commands.yaml security section plus domain-specific tools.
      Generate report in .agent-output/security-auditor/.
      Update {{handoff_file}} (Security_audit: PASS|CONDITIONAL|FAIL, Next=verifier).
      If FAIL, set Blocked: true, Return_to_step: implement, Block_reason: [critical vulnerabilities].
  - id: verify
    subagent_type: verifier
    skills:
      - common/protocol-enforcement
    entry_criteria: All prior steps complete
    exit_criteria: All acceptance criteria met; specs updated
    handoff_to: null
    on_concern_return_to: review
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Read {{handoff_file}}. Validate acceptance criteria from Plan_ref.
      Confirm: Architect_approval, Code_review_verdict, Security_audit.
      For Manual_verification items: verify programmatically if possible, else ASK user. Do NOT mark done until all resolved.
      Traceability check (if specs exist for this feature):
        1. Read the spec's Traceability Matrix
        2. Verify: every RULE in the spec that was touched has a TS scenario
        3. Verify: every [automated] TS referenced by the plan has a test file in the matrix
        4. Verify: every test file listed is passing (from Tester's report)
        5. Report gaps: "RULE-{FEAT}-NNN has no scenario" or "TS-{FEAT}-NNN has no test"
        6. Update spec's Coverage line with current counts
      Update affected specs in specs/features/ to reflect new/changed requirements.
      If an architecture decision was made, create ADR in specs/architecture/ using .cursor/templates/adr.template.md.
      Update specs/project.living.md section 6 (Decision Log) with a summary of what was decided.
      Generate knowledge/searchable/YYMMDD-{topic}-validation.md with: implemented changes, automated results, traceability coverage, specs updated.
      When task DONE: DELETE {{handoff_file}}.
