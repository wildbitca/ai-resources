# Domain-agnostic bugfix workflow template.
# Orchestrator resolves {{domain}} from detection. Domain-specific content comes from:
#   - _domain-commands.yaml (commands, research_guidance, implement_guidance)
#   - Persona files (personas/{role}-{domain}.md → roles/{role}.md)
#
# Flow: [worktree] → research → explore → implement → test → security → verify → [merge]
# REQUIRES worktree. See .cursorrules.
#
# handoff_file: .agent-output/handoff-<branch>.md. DELETE when DONE.
#
name: bugfix
description: Domain-agnostic bugfix workflow. research → explore → implement → test → security → verify.
domain: "{{domain}}"
trigger: User asks to fix a bug, resolve an issue, or correct broken behavior.
prerequisites: []
steps:
  - id: research
    subagent_type: generalPurpose
    skills:
      - common/best-practices
      - common/context-optimization
    entry_criteria: Bug/issue defined
    exit_criteria: Research document written to specs/knowledge/research/
    handoff_to: explore
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Bug/context: {{user_goal}}.
      Assess complexity: if simple/obvious bug (typo, config, single-file), set Research_needed: no, advance.
      If complex (multi-file, unfamiliar area, intermittent, architectural):
        1. Read relevant specs from specs/features/ for existing requirements and constraints.
        2. Search specs/knowledge/research/ for prior research on this area.
        3. Follow the research_guidance from $AGENT_KIT/cursor/workflows/_domain-commands.yaml for {{domain}}.
        4. Generate specs/knowledge/research/YYMMDD-{topic}.md with: bug analysis, file:line refs, potential root causes, open questions.
      Update {{handoff_file}} (Research_ref, Spec_refs, Research_needed, Next=explore).
      If blocked, set Blocked: true, Return_to_step: research, Block_reason: [reason].
  - id: explore
    subagent_type: generalPurpose
    skills:
      - common/best-practices
      - common/context-optimization
    entry_criteria: User goal defined
    exit_criteria: Exploration complete; handoff updated with findings
    handoff_to: implement
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Bug/context: {{user_goal}}.
      Read Research_ref, Spec_refs from {{handoff_file}} if Research_needed: yes.
      Task: Locate relevant code and identify likely cause. Thoroughness: medium.
      If the fix requires an architectural decision or non-trivial approach, save to specs/knowledge/decisions/YYMMDD-{topic}-fix-plan.md.
      Return: Summary and file paths. Update {{handoff_file}} (Goal reached, Changes made=none, Next=implementer).
      If blocked, set Blocked: true, Return_to_step: [id], Block_reason: [reason].
  - id: implement
    subagent_type: implementer
    skills:
      - common/best-practices
      - common/error-handling
    entry_criteria: Bug located; fix approach determined
    exit_criteria: Fix applied, lint passes
    handoff_to: test
    on_concern_return_to: explore
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Read {{handoff_file}}. Follow implement_guidance from _domain-commands.yaml for {{domain}} and your loaded persona.
      Apply the fix. Do NOT write tests (tester does).
      Run analyze commands from _domain-commands.yaml to verify no lint errors.
      Update {{handoff_file}} (Changes made, Next=tester).
      If blocked, set Blocked: true, Return_to_step: explore, Block_reason: [reason].
  - id: test
    subagent_type: tester
    skills:
      - common/tdd
    entry_criteria: Fix applied
    exit_criteria: All tests pass
    handoff_to: security
    on_concern_return_to: implement
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Read {{handoff_file}}. Read Spec_refs if available.
      If the fix touches a rule with BDD scenarios in the spec, verify those scenarios still pass. If new edge cases were found, add regression test and update spec Traceability Matrix.
      Run test + analyze commands from $AGENT_KIT/cursor/workflows/_domain-commands.yaml ({{domain}} section).
      MANDATORY: ALL commands MUST exit 0. If any fails, set Blocked: true, Return_to_step: implement, Block_reason: [failures].
      Create report in .agent-output/tester/.
      Update {{handoff_file}} (Test_report, Next=security-auditor).
  - id: security
    subagent_type: security-auditor
    skills:
      - common/security-audit
      - common/security-standards
    entry_criteria: Tests pass
    exit_criteria: No regressions introduced
    handoff_to: verify
    on_concern_return_to: implement
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Read {{handoff_file}}. If the fix touches security-sensitive code (auth, permissions, uploads, PII), run abbreviated security review adapted to {{domain}}.
      Otherwise, set Security_audit: N/A and advance.
      Update {{handoff_file}} (Security_audit, Next=verifier).
  - id: verify
    subagent_type: verifier
    skills:
      - common/protocol-enforcement
      - knowledge-audit
    entry_criteria: All prior steps complete
    exit_criteria: Bug confirmed fixed; specs updated if needed
    handoff_to: null
    on_concern_return_to: implement
    prompt_template: |
      Workspace: {{workspace}}. Domain: {{domain}}.
      Read {{handoff_file}}. Verify the bug is fixed and no regressions introduced.
      For Manual_verification items, ASK the user.
      If the fix changes existing requirements or reveals a spec gap:
        1. Update the relevant spec in specs/features/ (add/modify RULE, add BDD scenario for the bug)
        2. Add a regression test scenario: TS-{FEAT}-ENNN with the bug's Given/When/Then
        3. Update Traceability Matrix if test was added
      Update specs/PROJECT.md (Decision Log or metrics) if a non-trivial decision was made.
      Generate specs/knowledge/searchable/YYMMDD-{topic}-bugfix-validation.md.
      MANDATORY SDD closure (skill knowledge-audit): READ $AGENT_KIT/cursor/skills/knowledge-audit/SKILL.md and execute in repo root — relink, merge, prune per skill (Tier B when safe). If Blocked with no spec promotion, skip prune.
      When task DONE: DELETE {{handoff_file}}.
